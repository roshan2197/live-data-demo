<div [ngClass]="isDarkMode ? 'dark-theme' : 'light-theme'" class="live-table-root flex flex-col transition-colors duration-300">
  <!-- Background -->
  <div [ngClass]="isDarkMode ? 'bg-gradient-to-b from-slate-700 via-slate-600 to-indigo-800' : 'bg-gradient-to-b from-blue-50 via-indigo-50 to-purple-50'" class="absolute inset-0 -z-10"></div>

  <!-- Header -->
  <div [ngClass]="isDarkMode ? 'bg-gradient-to-r from-indigo-800 to-slate-700 border-indigo-600 text-white' : 'bg-gradient-to-r from-blue-100 to-indigo-100 border-blue-300 text-gray-900'" class="flex flex-col gap-3 sm:flex-row sm:justify-between sm:items-center px-3 sm:px-6 md:px-8 py-2 border-b shadow-lg relative z-20">
    <h1 class="text-lg sm:text-xl md:text-2xl font-bold">Live Data Monitor</h1>
    <div class="flex flex-wrap items-center gap-2 sm:gap-4">
      <!-- Connection Status -->
      <div [ngClass]="isDarkMode ? 'bg-slate-600 bg-opacity-70 border-indigo-500 text-slate-50' : 'bg-white bg-opacity-70 border-blue-300 text-gray-900'" class="flex items-center gap-2 px-3 py-2 rounded-md border">
        <span
          class="w-2 h-2 rounded-full"
          [ngClass]="connectionStatus === 'connected' ? 'bg-emerald-400' : 'bg-orange-400'">
        </span>
        <span class="text-sm font-medium">
          {{ connectionStatus === 'connected' ? 'Connected' : 'Disconnected' }}
        </span>
      </div>

      <!-- Theme Toggle -->
      <button
        (click)="toggleTheme()"
        [ngClass]="isDarkMode ? 'bg-slate-600 hover:bg-slate-500 text-yellow-300' : 'bg-blue-200 hover:bg-blue-300 text-gray-700'"
        class="flex items-center gap-2 px-3 py-2 rounded-md transition-colors font-medium text-sm">
        {{ isDarkMode ? 'Light' : 'Dark' }}
      </button>
    </div>
  </div>

  <!-- Table Container -->
  <div class="flex-1 overflow-auto w-full px-2 sm:px-4 md:px-6 py-3 sm:py-4 relative z-10">
    <div [ngClass]="isDarkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-blue-200'" class="h-full flex flex-col rounded-xl border shadow-2xl overflow-auto">
      <table class="border-collapse">
        <thead [ngClass]="isDarkMode ? 'bg-gradient-to-r from-indigo-800 to-slate-700' : 'bg-gradient-to-r from-blue-100 to-indigo-100'">
          <tr [ngClass]="isDarkMode ? 'border-slate-300' : 'border-blue-200'" class="border-b">
            <th [ngClass]="isDarkMode ? 'text-white' : 'text-gray-900'" class="px-3 sm:px-4 md:px-6 py-3 sm:py-4 text-left text-xs font-semibold uppercase tracking-wide">ID</th>
            <th
              *ngFor="let field of gridFields"
              [ngClass]="isDarkMode ? 'text-white' : 'text-gray-900'"
              class="px-3 sm:px-4 md:px-6 py-3 sm:py-4 text-left text-xs font-semibold uppercase tracking-wide"
            >
              {{ field.label }}
            </th>
          </tr>
        </thead>
        <tbody>
          <tr
            *ngFor="let item of data; let even = even"
            [ngClass]="{'bg-slate-700': even && isDarkMode, 'bg-blue-50': even && !isDarkMode, 'border-slate-600': isDarkMode, 'border-blue-100': !isDarkMode, 'animate-rowBlink': isRowBlinking(item.id)}"
            class="border-b transition-colors hover:opacity-75">
            <td
              [ngClass]="{'text-white': isDarkMode, 'text-gray-900': !isDarkMode, 'animate-cellBlink': isCellBlinking(item.id, 'id')}"
              class="px-3 sm:px-4 md:px-6 py-3 sm:py-4 text-sm font-medium transition-colors">
              {{ item.id }}
            </td>
            <td
              *ngFor="let field of gridFields"
              [ngClass]="{
                'text-cyan-400': field.type === 'currency' && isDarkMode,
                'text-blue-600': field.type === 'currency' && !isDarkMode,
                'text-white': field.type !== 'currency' && isDarkMode,
                'text-gray-900': field.type !== 'currency' && !isDarkMode,
                'animate-cellBlink': isCellBlinking(item.id, field.key === 'updated_at' ? 'updated' : field.key)
              }"
              class="px-3 sm:px-4 md:px-6 py-3 sm:py-4 text-sm transition-colors"
            >
              <ng-container [ngSwitch]="field.type">
                <span
                  *ngSwitchCase="'status'"
                  class="status-pill inline-block px-3 py-1 rounded-full text-xs font-semibold"
                  [ngClass]="getStatusBgClass(item[field.key])"
                  [title]="item[field.key]"
                >
                  {{ item[field.key] }}
                </span>
                <span class="cell-text" *ngSwitchDefault [title]="formatValue(item, field)">{{ formatValue(item, field) }}</span>
              </ng-container>
            </td>
            <!-- <td class="px-6 py-4 text-center space-x-2">
              <button
                (click)="triggerCellBlink(item.id, 'value')"
                [ngClass]="isDarkMode ? 'bg-indigo-600 hover:bg-indigo-700' : 'bg-blue-500 hover:bg-blue-600'"
                class="inline-block px-3 py-1 text-xs font-semibold text-white rounded-md transition-colors shadow-sm">
                Cell
              </button>
              <button
                (click)="triggerRowBlink(item.id)"
                [ngClass]="isDarkMode ? 'bg-blue-600 hover:bg-blue-700' : 'bg-cyan-500 hover:bg-cyan-600'"
                class="inline-block px-3 py-1 text-xs font-semibold text-white rounded-md transition-colors shadow-sm">
                Row
              </button>
            </td> -->
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Footer Info -->
  <!-- <div [ngClass]="isDarkMode ? 'bg-gradient-to-r from-indigo-800 to-slate-700 border-indigo-600 text-slate-50' : 'bg-gradient-to-r from-blue-100 to-indigo-100 border-blue-300 text-gray-900'" class="px-6 py-3 border-t text-xs font-medium flex items-center justify-between relative z-20 transition-colors duration-300">
    <div>
      <span>{{ data.length }} records</span> â€¢ Live updates via WebSocket
    </div>
    <div class="flex items-center gap-6">
      <span class="flex items-center gap-2">
        <span class="inline-block w-3 h-3 rounded" style="background-color: #fbbf24;"></span>

      </span>
      <span class="flex items-center gap-2">
        <span class="inline-block w-3 h-3 rounded" style="background-color: #2dd4bf;"></span>

      </span>
    </div>
  </div> -->
</div>
